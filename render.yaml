services:
  - type: web
    name: stock-radar-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: SPREADSHEET_URL
        sync: false
      - key: GCP_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
