<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 stock-radar</title>
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--bg2:#1a1d27;--bg3:#262b38;
  --border:#2e3347;--text:#d1d4dc;--text2:#8a8d9d;
  --accent:#2962FF;--red:#ef5350;--green:#26a69a;--yellow:#FFD600;
}
body{background:var(--bg);color:var(--text);font-family:"Microsoft JhengHei",sans-serif}
input,select,button{font-family:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{width:360px;padding:36px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}
.login-title{text-align:center;font-size:1.8rem;font-weight:700;color:var(--accent);margin-bottom:6px}
.login-sub{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:5px}
.form-group input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.95rem}
.form-group input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:1rem;font-weight:600}
.btn-primary:hover{background:#1a45cc}
.login-error{color:var(--red);font-size:.85rem;text-align:center;margin-top:8px;min-height:18px}

/* App - hidden by default */
#app{display:none}

/* Desktop layout */
@media(min-width:769px){
  .app-layout{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-nav{padding:10px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
  .nav-btn{display:block;width:100%;padding:9px 12px;margin-bottom:3px;background:transparent;border:none;border-radius:6px;color:var(--text2);text-align:left;font-size:.9rem}
  .nav-btn:hover{background:var(--bg3);color:var(--text)}
  .nav-btn.active{background:var(--accent);color:#fff}
  .sidebar-vip{flex:1;overflow-y:auto;padding:6px}
  .sidebar-logout{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
  .btn-logout{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:.85rem}
  .btn-logout:hover{border-color:var(--red);color:var(--red)}
  .main-content{flex:1;overflow-y:auto;padding:20px 24px}
}

/* Mobile layout - fixed topbar + scrollable body */
@media(max-width:768px){
  html,body{height:auto;overflow-y:auto}
  .app-layout{display:block}
  .sidebar{
    position:fixed;top:0;left:0;right:0;z-index:200;
    background:var(--bg2);border-bottom:2px solid var(--border);
  }
  .sidebar-header{padding:6px 10px;display:flex;align-items:center;gap:8px}
  .sidebar-user{font-size:.82rem;font-weight:600}
  .sidebar-role{font-size:.68rem;color:var(--text2)}
  .sidebar-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:4px 6px}
  .nav-btn{display:block;width:100%;padding:6px 4px;font-size:.74rem;white-space:nowrap;background:transparent;border:none;border-radius:5px;color:var(--text2);text-align:center;overflow:hidden;text-overflow:ellipsis}
  .nav-btn.active{background:var(--accent);color:#fff}
  .sidebar-vip{display:none} /* 手機版VIP移到main content */
  .sidebar-logout{padding:4px 6px}
  .btn-logout{padding:5px 12px;font-size:.78rem;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2)}
  .main-content{padding:8px;padding-top:110px} /* JS動態調整 */
  #mobile-vip-panel{display:block} /* 手機版VIP在main content */
  .login-box{width:92%;padding:24px 18px}
}

/* Section */
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}

/* Controls */
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}
.ctrl-group label{font-size:.8rem;color:var(--text2)}
.ctrl-group select,.ctrl-group input[type=text],.ctrl-group input[type=date]{
  padding:8px 10px;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:.88rem;min-width:120px
}
.ctrl-group select:focus,.ctrl-group input:focus{outline:none;border-color:var(--accent)}
.radio-group{display:flex;gap:5px;flex-wrap:wrap}
.radio-group label{padding:6px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:.83rem;cursor:pointer}
.radio-group input[type=radio]{display:none}
.radio-group input[type=radio]:checked+label{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-search{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600;font-size:.88rem}
.btn-search:hover{background:#1a45cc}
.btn-secondary{padding:7px 14px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:.83rem}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:768px){
  .ctrl-row{flex-direction:column;gap:8px}
  .ctrl-group{width:100%}
  .ctrl-group select,.ctrl-group input[type=text],.ctrl-group input[type=date]{width:100%;min-width:unset}
}

/* Table */
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{padding:7px 9px;background:var(--bg3);color:var(--text2);text-align:left;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:6px 9px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.03)}
.link-btn{color:var(--accent);text-decoration:none;font-size:.78rem;padding:2px 5px;border:1px solid var(--accent);border-radius:4px}
.link-btn:hover{background:var(--accent);color:#fff}
@media(max-width:768px){table{font-size:.74rem}th,td{padding:5px 7px}}

/* Status */
.status-msg{padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:.87rem}
.status-info{background:rgba(41,98,255,.1);border:1px solid rgba(41,98,255,.3);color:#90b0ff}
.status-error{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.3);color:#ff9090}
.status-success{background:rgba(38,166,154,.1);border:1px solid rgba(38,166,154,.3);color:#90e0d8}
.loading{display:flex;align-items:center;gap:10px;color:var(--text2);padding:20px;justify-content:center}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TAB4 */
.chart-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:10px;background:var(--bg2);border-radius:8px;margin-bottom:10px}
#chart-wrapper{position:relative;width:100%;height:calc(100vh - 240px);min-height:500px;background:var(--bg);border-radius:8px;overflow:hidden}
#chart-container{width:100%;height:100%}
.chart-legend{position:absolute;left:10px;top:10px;z-index:99;background:rgba(14,17,23,.92);padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:.78rem;pointer-events:none;max-width:240px}
.legend-title{color:var(--accent);font-weight:700;font-size:.85rem;margin-bottom:5px;border-bottom:1px solid var(--border);padding-bottom:3px}
.legend-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:2px}
.legend-lbl{color:var(--text2)}
.legend-vol{margin-top:5px;padding-top:5px;border-top:1px dashed var(--border);font-weight:700}
.legend-macd{margin-top:3px;font-size:.72rem;color:var(--text2);line-height:1.4}
@media(max-width:768px){
  .chart-controls{flex-direction:column;gap:6px}
  #chart-wrapper{height:75vh;min-height:480px}
  .chart-legend{font-size:.72rem;max-width:200px;padding:6px 10px}
}

/* Collapsible */
.list-tab-summary{
  cursor:pointer;padding:8px 12px;font-size:.88rem;font-weight:600;
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  color:var(--text);list-style:none;display:flex;align-items:center;gap:6px;
  user-select:none;margin-bottom:4px;
}
.list-tab-summary::-webkit-details-marker{display:none}
details[open] .list-tab-summary{border-color:var(--accent);color:var(--accent)}

/* VIP */
.vip-form{display:flex;flex-direction:column;gap:6px;padding:6px}
.vip-form label{font-size:.75rem;color:var(--text2)}
.vip-form select,.vip-form input[type=range]{width:100%}
.vip-form input[type=range]{accent-color:var(--accent)}
.vip-row{display:flex;justify-content:space-between;font-size:.74rem;color:var(--text2)}
.vip-apply-btn{width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:.8rem;font-weight:600;margin-top:4px}
.vip-table{width:100%;border-collapse:collapse;font-size:.74rem}
.vip-table th{color:var(--text2);padding:4px;border-bottom:1px solid var(--border);font-weight:600}
.vip-table td{padding:4px;border-bottom:1px solid var(--border)}
.vip-add-btn{width:100%;padding:6px;margin-top:6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:.75rem}
.vip-add-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Watchlist note input */
.note-input{background:transparent;border:none;color:var(--text);font-size:.83rem;width:100%;outline:none}
.note-input:focus{border-bottom:1px solid var(--accent)}
</style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">📡 stock-radar</div>
    <div class="login-sub">分點追蹤平台</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="login-pwd" placeholder="輸入密碼" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn">🔐 登入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-user" id="sb-username">載入中...</div>
        <div class="sidebar-role" id="sb-role"></div>
      </div>
      <div class="sidebar-nav">
        <button class="nav-btn active" data-tab="t1">🚀 特定分點</button>
        <button class="nav-btn" data-tab="t2">📊 股票代號</button>
        <button class="nav-btn" data-tab="t3">📍 地緣券商</button>
        <button class="nav-btn" data-tab="t4">📈 K線圖</button>
      </div>
      <!-- VIP 掃描清單 -->
      <div id="vip-panel" style="display:none">
        <details id="vip-details">
          <summary style="cursor:pointer;padding:8px 12px;font-size:.85rem;font-weight:600;color:var(--text2);list-style:none;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border)">
            📡 VIP 掃描清單 <span style="font-size:.7rem;margin-left:auto">▼</span>
          </summary>
          <div style="padding:8px">
        <div class="vip-form" id="vip-filter-form">
          <div>
            <label>K線週期</label>
            <select id="vip-period">
              <option value="ScanResult">日線</option>
              <option value="ScanResult_W">週線</option>
            </select>
          </div>
          <div>
            <div class="vip-row"><label>最近天數</label><span id="vip-days-val">60</span></div>
            <input type="range" id="vip-days" min="7" max="365" value="60" step="7">
          </div>
          <div>
            <label>方向</label>
            <select id="vip-dir">
              <option>全部</option><option>買進</option><option>賣出</option>
            </select>
          </div>
          <div>
            <div class="vip-row"><label>最低強度</label><span id="vip-score-val">60</span></div>
            <input type="range" id="vip-score" min="0" max="120" value="60" step="5">
          </div>
          <div>
            <div class="vip-row"><label>最低佔比%</label><span id="vip-pct-val">60</span></div>
            <input type="range" id="vip-pct" min="0" max="100" value="60" step="5">
          </div>
          <div>
            <label>分點過濾</label>
            <select id="vip-broker-sel"><option>全部分點</option></select>
          </div>
          <button class="vip-apply-btn" id="vip-apply-btn">🔍 套用篩選</button>
        </div>
        <div id="vip-caption" style="font-size:.75rem;color:var(--text2);margin:4px 0"></div>
        <div id="vip-table-wrap"></div>
        <div id="vip-sel-wrap" style="margin-top:6px"></div>
          </div>
        </details>
      </div>
      <div class="sidebar-logout">
        <button class="btn-logout" id="logout-btn">登出</button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-content" id="main-content">

      <!-- 手機版 VIP panel（桌面版隱藏，手機版顯示） -->
      <div id="mobile-vip-panel" style="display:none;margin-bottom:10px">
        <details>
          <summary class="list-tab-summary">📡 VIP 掃描清單</summary>
          <div style="padding:6px 0">
            <div class="vip-form">
              <div><label>K線週期</label><select id="m-vip-period"><option value="ScanResult">日線</option><option value="ScanResult_W">週線</option></select></div>
              <div><div class="vip-row"><label>最近天數</label><span id="m-vip-days-val">60</span></div><input type="range" id="m-vip-days" min="7" max="365" value="60" step="7"></div>
              <div><label>方向</label><select id="m-vip-dir"><option>全部</option><option>買進</option><option>賣出</option></select></div>
              <div><div class="vip-row"><label>最低強度</label><span id="m-vip-score-val">60</span></div><input type="range" id="m-vip-score" min="0" max="120" value="60" step="5"></div>
              <div><div class="vip-row"><label>最低佔比%</label><span id="m-vip-pct-val">60</span></div><input type="range" id="m-vip-pct" min="0" max="100" value="60" step="5"></div>
              <div><label>分點過濾</label><select id="m-vip-broker-sel"><option>全部分點</option></select></div>
              <button class="vip-apply-btn" id="m-vip-apply-btn">🔍 套用篩選</button>
            </div>
            <div id="m-vip-caption" style="font-size:.75rem;color:var(--text2);margin:4px 0"></div>
            <div id="m-vip-table-wrap"></div>
            <div id="m-vip-sel-wrap" style="margin-top:6px"></div>
          </div>
        </details>
      </div>

      <!-- TAB1: 特定分點 -->
      <div id="tab-t1">
        <div class="section-title">🚀 特定分點</div>
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label>券商</label>
            <select id="t1-hq" style="min-width:160px"></select>
          </div>
          <div class="ctrl-group">
            <label>分點</label>
            <select id="t1-br" style="min-width:180px"></select>
          </div>
          <div class="ctrl-group">
            <label>起始</label>
            <input type="date" id="t1-sd">
          </div>
          <div class="ctrl-group">
            <label>結束</label>
            <input type="date" id="t1-ed">
          </div>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label>統計單位</label>
            <div class="radio-group">
              <input type="radio" name="t1-unit" id="t1-shares" value="shares" checked>
              <label for="t1-shares">張數</label>
              <input type="radio" name="t1-unit" id="t1-amount" value="amount">
              <label for="t1-amount">金額</label>
            </div>
          </div>
          <div class="ctrl-group">
            <label>篩選模式</label>
            <div class="radio-group">
              <input type="radio" name="t1-mode" id="t1-strict" value="strict">
              <label for="t1-strict">嚴格</label>
              <input type="radio" name="t1-mode" id="t1-filter" value="filter" checked>
              <label for="t1-filter">濾網</label>
            </div>
          </div>
          <div class="ctrl-group">
            <label>佔比 >= %</label>
            <input type="number" id="t1-pct" value="95" min="0" max="100" style="width:80px">
          </div>
          <button class="btn-search" id="t1-search-btn">🚀 開始尋寶</button>
        </div>
        <div id="t1-status"></div>
        <div id="t1-buy-wrap"></div>
        <div id="t1-sell-wrap"></div>
      </div>

      <!-- TAB2: 股票代號 -->
      <div id="tab-t2" style="display:none">
        <div class="section-title">📊 股票代號 — 誰在買賣這檔股票？</div>
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label>股票代號</label>
            <input type="text" id="t2-sid" value="2408" style="width:100px">
          </div>
          <div class="ctrl-group">
            <label>起始</label>
            <input type="date" id="t2-sd">
          </div>
          <div class="ctrl-group">
            <label>結束</label>
            <input type="date" id="t2-ed">
          </div>
          <div class="ctrl-group">
            <label>模式</label>
            <div class="radio-group">
              <input type="radio" name="t2-mode" id="t2-strict" value="strict">
              <label for="t2-strict">嚴格</label>
              <input type="radio" name="t2-mode" id="t2-filter" value="filter" checked>
              <label for="t2-filter">濾網</label>
            </div>
          </div>
          <div class="ctrl-group">
            <label>門檻佔比%</label>
            <input type="number" id="t2-pct" value="95" min="0" max="100" style="width:80px">
          </div>
          <div class="ctrl-group">
            <label>最低張數</label>
            <input type="number" id="t2-vol" value="10" min="0" style="width:80px">
          </div>
          <button class="btn-search" id="t2-search-btn">🚀 開始追蹤</button>
        </div>
        <div id="t2-status"></div>
        <div id="t2-buy-wrap"></div>
        <div id="t2-sell-wrap"></div>
      </div>

      <!-- TAB3: 地緣券商 -->
      <div id="tab-t3" style="display:none">
        <div class="section-title">📍 地緣券商</div>
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label>地緣關鍵字</label>
            <select id="t3-loc" style="min-width:120px"></select>
          </div>
          <div class="ctrl-group">
            <label>特定分點</label>
            <select id="t3-br" style="min-width:180px"></select>
          </div>
          <div class="ctrl-group">
            <label>起始</label>
            <input type="date" id="t3-sd">
          </div>
          <div class="ctrl-group">
            <label>結束</label>
            <input type="date" id="t3-ed">
          </div>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label>統計單位</label>
            <div class="radio-group">
              <input type="radio" name="t3-unit" id="t3-shares" value="shares" checked>
              <label for="t3-shares">張數</label>
              <input type="radio" name="t3-unit" id="t3-amount" value="amount">
              <label for="t3-amount">金額</label>
            </div>
          </div>
          <div class="ctrl-group">
            <label>篩選模式</label>
            <div class="radio-group">
              <input type="radio" name="t3-mode" id="t3-strict" value="strict">
              <label for="t3-strict">嚴格</label>
              <input type="radio" name="t3-mode" id="t3-filter" value="filter" checked>
              <label for="t3-filter">濾網</label>
            </div>
          </div>
          <div class="ctrl-group">
            <label>佔比 >= %</label>
            <input type="number" id="t3-pct" value="95" min="0" max="100" style="width:80px">
          </div>
          <button class="btn-search" id="t3-search-btn">📡 啟動雷達</button>
        </div>
        <div id="t3-status"></div>
        <div id="t3-buy-wrap"></div>
        <div id="t3-sell-wrap"></div>
      </div>

      <!-- TAB4: K線圖 -->
      <div id="tab-t4" style="display:none">
        <!-- 控制列：手機版緊湊單行 -->
        <div class="chart-controls">
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;width:100%">

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const API = 'https://stock-radar-api-ky4l.onrender.com';

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let token = localStorage.getItem('sr_token') || '';
let username = localStorage.getItem('sr_username') || '';
let userRole = localStorage.getItem('sr_role') || '';
let brokerTree = {};   // {hq_name: {bid, branches:[...]}}
let brokerMap = {};    // {br_name: {hq_id, br_id, hq_name}}
let geoMap = {};       // {loc: [br_names]}
let watchlist = [];
let workingGroup = [];
let vipScanData = [];
let vipFiltered = [];
let vipSelected = new Set();
let currentChart = null;
let currentTab = 't1';

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
const $ = id => document.getElementById(id);
// el(tag, [attr], ...children) — attr 是可選的普通物件
const el = (tag, ...args) => {
  const e = document.createElement(tag);
  const attr = (args[0] && typeof args[0]==='object' && !(args[0] instanceof Node)) ? args.shift() : {};
  Object.entries(attr).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='html') e.innerHTML=v;
    else if(k==='text') e.textContent=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  });
  args.forEach(c=>{
    if(c==null) return;
    if(typeof c==='string') e.appendChild(document.createTextNode(c));
    else if(c instanceof Node) e.appendChild(c);
  });
  return e;
};
// 常用快捷
const td = (...args) => el('td', ...args);
const th = (text) => el('th', {text});
const tr = (...tds) => { const r=el('tr'); tds.forEach(t=>r.appendChild(t)); return r; };

function showStatus(id, msg, type='info'){
  const d = $(id);
  if(!d) return;
  d.innerHTML = msg ? `<div class="status-msg status-${type}">${msg}</div>` : '';
}

function fmtDate(d){ return d.toISOString().split('T')[0]; }
function today(){ return fmtDate(new Date()); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return fmtDate(d); }

async function apiFetch(path, opts={}){
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API+path, {...opts, headers:{...headers,...(opts.headers||{})}});
  if(res.status===401){ doLogout(); throw new Error('未登入'); }
  if(!res.ok){
    const err = await res.json().catch(()=>({detail:res.statusText}));
    throw new Error(err.detail||res.statusText);
  }
  return res.json();
}

// ══════════════════════════════════════
// LOGIN / AUTH
// ══════════════════════════════════════
$('login-btn').onclick = async () => {
  const email = $('login-email').value.trim();
  const pwd   = $('login-pwd').value;
  $('login-error').textContent = '';
  if(!email||!pwd){ $('login-error').textContent='請輸入 Email 和密碼'; return; }
  try {
    $('login-btn').textContent = '登入中...';
    $('login-btn').disabled = true;
    const data = await fetch(API+'/api/auth/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pwd})
    });
    if(!data.ok){
      const err = await data.json();
      throw new Error(err.detail||'登入失敗');
    }
    const res = await data.json();
    token = res.token; username = res.username; userRole = res.role;
    localStorage.setItem('sr_token',token);
    localStorage.setItem('sr_username',username);
    localStorage.setItem('sr_role',userRole);
    await initApp();
  } catch(e){
    $('login-error').textContent = e.message;
  } finally {
    $('login-btn').textContent = '🔐 登入';
    $('login-btn').disabled = false;
  }
};
$('login-pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') $('login-btn').click(); });

function doLogout(){
  localStorage.removeItem('sr_token');
  localStorage.removeItem('sr_username');
  localStorage.removeItem('sr_role');
  token=''; username=''; userRole='';
  $('app').style.display='none';
  $('login-screen').style.display='flex';
}
$('logout-btn').onclick = doLogout;

// ══════════════════════════════════════
// INIT APP
// ══════════════════════════════════════
async function initApp(){
  $('login-screen').style.display='none';
  $('app').style.display='block';
  $('sb-username').textContent = username;
  $('sb-role').textContent = userRole==='vip'?'⭐ VIP 會員':userRole==='admin'?'🔧 管理員':'👤 會員';

  // 載入券商資料
  const mainContent = $('main-content');
  const loadingDiv = document.createElement('div');
  loadingDiv.id = 'broker-loading';
  loadingDiv.className = 'status-msg status-info';
  loadingDiv.style.margin = '0 0 10px';
  loadingDiv.innerHTML = '<div class="loading"><div class="spinner"></div>正在連線伺服器，首次啟動約需 30~60 秒請稍候...</div>';
  mainContent.insertBefore(loadingDiv, mainContent.firstChild);

  try {
    const [tree, map, geo] = await Promise.all([
      apiFetch('/api/brokers/tree'),
      apiFetch('/api/brokers/map'),
      apiFetch('/api/brokers/geo'),
    ]);
    brokerTree = tree; brokerMap = map; geoMap = geo;
    buildT1Selects();
    buildT3Selects();
    buildT4BrSelect();
    loadingDiv.remove();
  } catch(e){
    loadingDiv.className = 'status-msg status-error';
    loadingDiv.innerHTML = `⚠️ 伺服器連線失敗，請重新整理頁面再試。(${e.message})`;
  }

  // 設預設日期
  ['t1','t2','t3'].forEach(t=>{
    $(t+'-sd').value = daysAgo(7);
    $(t+'-ed').value = today();
  });

  // 載入最愛和工作組
  await loadWatchlist();
  await loadWorkingGroup();
  renderWatchlist();
  renderWorkingGroup();

  // VIP
  if(userRole==='vip'){
    $('vip-panel').style.display='block';
    initVipPanel();
  }

  // 手機版：動態設定 main-content 的 padding-top = sidebar 高度
  function adjustMobilePadding(){
    if(window.innerWidth <= 768){
      const sb = document.querySelector('.sidebar');
      const mc = document.querySelector('.main-content');
      if(sb && mc) mc.style.paddingTop = (sb.offsetHeight + 8) + 'px';
      // 手機版顯示 mobile VIP panel
      if(userRole==='vip'){
        $('mobile-vip-panel').style.display='block';
      }
    } else {
      const mc = document.querySelector('.main-content');
      if(mc) mc.style.paddingTop='';
      $('mobile-vip-panel').style.display='none';
    }
  }
  adjustMobilePadding();
  new ResizeObserver(adjustMobilePadding).observe(document.querySelector('.sidebar'));
  window.addEventListener('resize', adjustMobilePadding);

  // 手機版 VIP panel 初始化（共用同一套 vipScanData，但有獨立的 DOM）
  if(userRole==='vip'){
    initMobileVipPanel();
  }

  // Tab 切換
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      currentTab = tab;
      ['t1','t2','t3','t4'].forEach(t=>{
        $('tab-'+t).style.display = t===tab?'':'none';
      });
    };
  });

  // 最愛/工作組用 details 收合，不需要 JS 切換
}

// BROKER SELECTS
// ══════════════════════════════════════
function buildT1Selects(){
  const hqSel = $('t1-hq');
  hqSel.innerHTML='';
  Object.keys(brokerTree).sort().forEach(hq=>{
    hqSel.appendChild(el('option',{value:hq,text:hq}));

  hqSel.onchange = ()=>{
    const br = $('t1-br');

// TAB1 特定分點
// ══════════════════════════════════════
$('t1-search-btn').onclick = async ()=>{
  const hqName = $('t1-hq').value;
  const brName = $('t1-br').value;
  const hqData = brokerTree[hqName];
  if(!hqData){ showStatus('t1-status','找不到券商','error'); return; }
  const hqId = hqData.bid;
  const brId = brokerMap[brName]?.br_id || hqId;
  const sd = $('t1-sd').value, ed = $('t1-ed').value;
  const unit = document.querySelector('input[name=t1-unit]:checked').value;

  showStatus('t1-status','<div class="loading"><div class="spinner"></div>查詢中...</div>');
  $('t1-buy-wrap').innerHTML=''; $('t1-sell-wrap').innerHTML='';

  try {

    let buyList, sellList;

      buyList  = data.filter(r=>r['買%']>=pct);
      sellList = data.filter(r=>r['賣%']>=pct);
    }

    sellList.sort((a,b)=>b[colS]-a[colS]);

    showStatus('t1-status','');
    renderStockTable('t1-buy-wrap', buyList, colB, colS, brName, brId, '🔴 買進', 'buy');

    showStatus('t1-status', e.message, 'error');

function renderStockTable(wrapId, list, colB, colS, brName, brId, title, side){
  const wrap = $(wrapId);
  if(!list.length){ wrap.innerHTML=`<div style="color:var(--text2);font-size:.85rem;padding:8px 0">${title} — 無資料</div>`; return; }
  const tbl = el('table',{class:'wl-table'});
  const thead = el('thead');
  thead.appendChild(tr(th('代號'),th('名稱'),th('買進'),th('賣出'),th('佔%'),th('K線'),th('繪圖')));
  tbl.appendChild(thead);
  const tbody = el('tbody');
  list.forEach(row=>{
    const sid = String(row['股票代號']||'').trim();
    // 股票名稱欄位可能包含代號+名稱，只取名稱部分
    let rawName = String(row['股票名稱']||'').trim();
    // 若名稱開頭是代號，去掉代號只留名稱
    const sname = rawName.replace(/^\d+[A-Za-z]?\s*/, '').trim() || rawName;
    const kUrl = `https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${sid}.djhtm`;
    const drawBtn = el('button',{class:'link-btn',text:'📊'});
    drawBtn.onclick = ()=>{ switchToT4(sid, brName); };
    tbody.appendChild(tr(
      td({text:sid}), td({text:sname}),
      td({text:(row[colB]||0).toLocaleString()}),
      td({text:(row[colS]||0).toLocaleString()}),
      td({text:(side==='buy'?row['買%']:row['賣%'])+'%'}),
      td(el('a',{class:'link-btn',href:kUrl,target:'_blank',text:'📈'})),
      td(drawBtn)
    ));
  });
  tbl.appendChild(tbody);
  wrap.innerHTML=`<div style="font-weight:600;margin:12px 0 6px">${title} — 共 ${list.length} 檔</div>`;
  wrap.appendChild(tbl);
}

  $('t4-sid').value = sid;

async function fetchYahooKline(sid, startY) {
  // 計算 range
  const startDate = new Date(startY);
  const now = new Date();
  const diffYears = (now - startDate) / (1000 * 60 * 60 * 24 * 365);
  const range = diffYears > 10 ? '20y' : diffYears > 5 ? '10y' : diffYears > 2 ? '5y' : '2y';

  for (const suffix of ['.TW', '.TWO']) {
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sid}${suffix}?range=${range}&interval=1d&includePrePost=false`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const json = await res.json();
      const result = json?.chart?.result?.[0];
      if (!result) continue;
      const timestamps = result.timestamps || result.timestamp;
      const quotes = result.indicators?.quote?.[0];
      if (!timestamps || !quotes) continue;
      const data = [];
      for (let i = 0; i < timestamps.length; i++) {
        const o = quotes.open?.[i], h = quotes.high?.[i];
        const l = quotes.low?.[i],  c = quotes.close?.[i];
        if (c == null || isNaN(c)) continue;
        const d = new Date(timestamps[i] * 1000);
        const dateStr = d.toISOString().split('T')[0];
        data.push({ Date: dateStr, Open: o, High: h, Low: l, Close: c });
      }
      // 過濾 start 之後的資料
      const filtered = data.filter(d => d.Date >= startY);
      if (filtered.length > 0) return { data: filtered };
    } catch(e) { continue; }
  }
  throw new Error(`找不到 ${sid} 的K線資料`);
}

async function drawChart(){
  const sid    = $('t4-sid').value.trim().toUpperCase();
  const brName = $('t4-br').value;
  const brInfo = brokerMap[brName];
  const period = document.querySelector('input[name=t4-period]:checked').value;
  const days   = parseInt($('t4-days').value)||300;
  const startY = $('t4-start').value;

  if(!brInfo){ showStatus('t4-status','找不到分點','error'); return; }
  showStatus('t4-status',`<div class="loading"><div class="spinner"></div>載入 ${sid} 資料中...</div>`);
  $('chart-wrapper').style.display='none';

  try {
    const [klineRes, histRes] = await Promise.all([
      apiFetch(`/api/stock/kline?sid=${sid}&start=${startY}`),
      apiFetch(`/api/stock/broker_history?sid=${sid}&br_id=${brInfo.br_id}&start=${startY}`),
    ]);

    const kdata = klineRes.data || [];
    const stockName = histRes.stock_name || '';
    const volMap = {};
    (histRes.records||[]).forEach(r=>{ volMap[r.Date]=r['買賣超']; });

    // 合併並 resample
    let merged = kdata.map(d=>({
      date: d.Date,
      open: d.Open, high: d.High, low: d.Low, close: d.Close,
      vol: volMap[d.Date]||0,
    }));

    if(period==='W') merged = resampleWeekly(merged);
    else if(period==='M') merged = resampleMonthly(merged);

    // BB (52)
    merged = calcBB(merged, 52, 2);
    // MACD
    merged = calcMACDFull(merged, 12,26,9, 'M1');
    merged = calcMACDFull(merged, 26,52,18, 'M2');

    // Divergence markers
    const {priceMarkers:pm1, macdMarkers:mm1} = getDivMarkers(merged,'M1_macd','M1_hist','S');
    const {priceMarkers:pm2, macdMarkers:mm2} = getDivMarkers(merged,'M2_macd','M2_hist','L');
    const allPriceMarkers = mergeMarkers([...pm1,...pm2]);

    // 只取最後 N 根
    const plotData = merged.slice(-days);
    const plotDates = new Set(plotData.map(d=>d.date));
    const finalPM = allPriceMarkers.filter(m=>plotDates.has(m.time)).sort((a,b)=>a.time>b.time?1:-1);
    const finalMM1 = mm1.filter(m=>plotDates.has(m.time)).sort((a,b)=>a.time>b.time?1:-1);
    const finalMM2 = mm2.filter(m=>plotDates.has(m.time)).sort((a,b)=>a.time>b.time?1:-1);

    showStatus('t4-status','');
    renderChart(plotData, finalPM, finalMM1, finalMM2, sid, stockName, brName);
  } catch(e){
    showStatus('t4-status', e.message, 'error');
  }
}

// ── Resample ──
function resampleWeekly(data){
  const weeks={};
  data.forEach(d=>{
    const dt=new Date(d.date);
    const day=dt.getDay();
    const fri=new Date(dt); fri.setDate(dt.getDate()+(5-day+7)%7);
    const key=fri.toISOString().split('T')[0];
    if(!weeks[key]) weeks[key]={date:key,open:d.open,high:d.high,low:d.low,close:d.close,vol:0};
    const w=weeks[key];
    w.high=Math.max(w.high,d.high); w.low=Math.min(w.low,d.low);
    w.close=d.close; w.vol+=d.vol;
  });
  return Object.values(weeks).sort((a,b)=>a.date>b.date?1:-1);
}
function resampleMonthly(data){
  const months={};
  data.forEach(d=>{
    const key=d.date.slice(0,7);
    if(!months[key]) months[key]={date:d.date,open:d.open,high:d.high,low:d.low,close:d.close,vol:0};
    const m=months[key];
    m.high=Math.max(m.high,d.high); m.low=Math.min(m.low,d.low);
    m.close=d.close; m.date=d.date; m.vol+=d.vol;
  });
  return Object.values(months).sort((a,b)=>a.date>b.date?1:-1);
}

// ── EMA / MACD / BB ──
function ema(vals, span){
  const k=2/(span+1), res=[];
  vals.forEach((v,i)=>{
    if(i===0) res.push(v);
    else res.push(v*k+res[i-1]*(1-k));
  });
  return res;
}
function calcMACDFull(data, fast, slow, signal, prefix){
  const closes = data.map(d=>d.close);
  const e1=ema(closes,fast), e2=ema(closes,slow);
  const macdLine=e1.map((v,i)=>v-e2[i]);
  const sigLine=ema(macdLine,signal);
  data.forEach((d,i)=>{
    d[prefix+'_macd']=macdLine[i];
    d[prefix+'_sig']=sigLine[i];
    d[prefix+'_hist']=macdLine[i]-sigLine[i];
  });
  return data;
}
function calcBB(data, w, mult){
  for(let i=0;i<data.length;i++){
    if(i<w-1){ data[i].bb_mid=null; data[i].bb_up=null; data[i].bb_dn=null; continue; }
    const slice=data.slice(i-w+1,i+1).map(d=>d.close);
    const mean=slice.reduce((a,b)=>a+b,0)/w;
    const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mean)**2,0)/w);
    data[i].bb_mid=mean; data[i].bb_up=mean+mult*std; data[i].bb_dn=mean-mult*std;
  }
  return data;
}

// ── Divergence Markers ──
function getDivMarkers(data, macdCol, histCol, prefix){
  const priceMarkers=[], macdMarkers=[];
  let curTopDif=0,curTopDate=null,curTopClose=0;
  let prevTopDif=0,prevTopDate=null,prevTopClose=0,curWaveHigh=0;
  let curBotDif=0,curBotDate=null,curBotClose=0;
  let prevBotDif=0,prevBotDate=null,prevBotClose=0,curWaveLow=1e9;
  let inRed=false,inGrn=false,topZeroBroken=false,botZeroBroken=false;

  for(let i=1;i<data.length;i++){
    const d=data[i],dp=data[i-1];
    const hist=d[histCol],histPrev=dp[histCol];
    const dif=d[macdCol],high=d.high,low=d.low,date=d.date;
    const crossUp=histPrev<=0&&hist>0, crossDown=histPrev>=0&&hist<0;

    if(crossUp){curTopDif=0;curTopDate=null;curTopClose=0;curWaveHigh=0;inRed=true;botZeroBroken=false;}
    if(!inRed&&dif<0&&prevTopDif>0) topZeroBroken=true;
    if(topZeroBroken&&crossUp){prevTopDif=0;prevTopDate=null;prevTopClose=0;topZeroBroken=false;}
    if(crossDown){
      inRed=false;
      if(prevTopDate&&prevTopDif>0) macdMarkers.push({time:prevTopDate,position:'aboveBar',color:'#FFD600',shape:'text',text:prevTopDif.toFixed(2),size:1});
      if(curTopDif>0&&prevTopDif>0&&curTopDif<prevTopDif&&curWaveHigh>=prevTopClose&&prevTopDate){
        const lbl=curWaveHigh===prevTopClose?'价同':'價破';
        priceMarkers.push({time:prevTopDate,position:'aboveBar',color:'#ef5350',shape:'arrowDown',text:`M${prefix}\n${lbl}\n${prevTopClose.toFixed(2)}`,price:prevTopClose});
      }
      if(curTopDif>0){prevTopDif=curTopDif;prevTopDate=curTopDate;prevTopClose=curTopClose;}
      curTopDif=0;curTopDate=null;curTopClose=0;curWaveHigh=0;
    }
    if(hist>0){if(dif>curTopDif){curTopDif=dif;curTopDate=date;curTopClose=high;}if(high>curWaveHigh)curWaveHigh=high;}
    if(crossDown){curBotDif=0;curBotDate=null;curBotClose=0;curWaveLow=1e9;inGrn=true;topZeroBroken=false;}
    if(!inGrn&&dif>0&&prevBotDif<0) botZeroBroken=true;
    if(botZeroBroken&&crossDown){prevBotDif=0;prevBotDate=null;prevBotClose=0;botZeroBroken=false;}
    if(crossUp){
      inGrn=false;
      if(prevBotDate&&prevBotDif<0) macdMarkers.push({time:prevBotDate,position:'belowBar',color:'#00E676',shape:'text',text:prevBotDif.toFixed(2),size:1});
      if(curBotDif<0&&prevBotDif<0&&curBotDif>prevBotDif&&curWaveLow<=prevBotClose&&prevBotDate){
        const lbl=curWaveLow===prevBotClose?'价同':'價破';
        priceMarkers.push({time:prevBotDate,position:'belowBar',color:'#26a69a',shape:'arrowUp',text:`W${prefix}\n${lbl}\n${prevBotClose.toFixed(2)}`,price:prevBotClose});
      }
      if(curBotDif<0){prevBotDif=curBotDif;prevBotDate=curBotDate;prevBotClose=curBotClose;}
      curBotDif=0;curBotDate=null;curBotClose=0;curWaveLow=1e9;
    }
    if(hist<0){if(dif<curBotDif){curBotDif=dif;curBotDate=date;curBotClose=low;}if(low<curWaveLow)curWaveLow=low;}

    if(i===data.length-1){
      if(hist>0&&curTopDif>0&&prevTopDif>0){
        if(prevTopDate) macdMarkers.push({time:prevTopDate,position:'aboveBar',color:'#FFD600',shape:'text',text:prevTopDif.toFixed(2),size:1});
        if(curTopDif<prevTopDif&&curWaveHigh>=prevTopClose&&prevTopDate){
          priceMarkers.push({time:prevTopDate,position:'aboveBar',color:'#ef5350',shape:'arrowDown',text:`未M${prefix}\n${curWaveHigh===prevTopClose?'价同':'價破'}\n${prevTopClose.toFixed(2)}`,price:prevTopClose});
        }
      }
      if(hist<0&&curBotDif<0&&prevBotDif<0){
        if(prevBotDate) macdMarkers.push({time:prevBotDate,position:'belowBar',color:'#00E676',shape:'text',text:prevBotDif.toFixed(2),size:1});
        if(curBotDif>prevBotDif&&curWaveLow<=prevBotClose&&prevBotDate){
          priceMarkers.push({time:prevBotDate,position:'belowBar',color:'#26a69a',shape:'arrowUp',text:`未W${prefix}\n${curWaveLow===prevBotClose?'价同':'價破'}\n${prevBotClose.toFixed(2)}`,price:prevBotClose});
        }
      }
    }
  }
  function dedup(lst){const seen=new Set(),out=[];[...lst].reverse().forEach(m=>{const k=m.time+'_'+m.text;if(!seen.has(k)){seen.add(k);out.push(m);}});return out.reverse();}
  return {priceMarkers:dedup(priceMarkers), macdMarkers:dedup(macdMarkers)};
}

function mergeMarkers(markers){
  const merged={};
  markers.forEach(m=>{
    if(!merged[m.time]) merged[m.time]={...m};
    else merged[m.time].text+='\n---\n'+m.text;
  });
  return Object.values(merged).sort((a,b)=>a.time>b.time?1:-1);
}

function renderChart(plotData, priceMarkers, macdMarkers1, macdMarkers2, sid, stockName, brName){
  $('chart-wrapper').style.display='block';
  if(currentChart){ try{currentChart.remove();}catch(e){} currentChart=null; }
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      _doRenderChart(plotData, priceMarkers, macdMarkers1, macdMarkers2, sid, stockName, brName);
    });
  });
}

function _doRenderChart(plotData, priceMarkers, macdMarkers1, macdMarkers2, sid, stockName, brName){
  const container = $('chart-container');
  container.innerHTML='';
  const w = container.clientWidth || window.innerWidth;
  const h = container.clientHeight || Math.max(400, window.innerHeight - 280);
  const isMobile = window.innerWidth <= 768;

  const chart = LightweightCharts.createChart(container,{
    layout:{backgroundColor:'#0e1117',textColor:'#d1d4dc'},
    watermark:{color:'rgba(255,255,255,0.06)',visible:true,text:`${sid} ${stockName}`,fontSize:isMobile?40:60,horzAlign:'center',vertAlign:'center'},
    grid:{vertLines:{visible:false},horzLines:{visible:false}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    width:w, height:h,
  });
  currentChart=chart;
  // K線：0~55%，買賣超：58~72%，短MACD：72~85%，長MACD：85~100%
  chart.priceScale('right').applyOptions({scaleMargins:{top:0.02,bottom:0.45}});

  const kSeries=chart.addCandlestickSeries({upColor:'#ef5350',downColor:'#26a69a',borderVisible:false,wickUpColor:'#ef5350',wickDownColor:'#26a69a',priceLineVisible:false});
  kSeries.setData(plotData.map(d=>({time:d.date,open:d.open,high:d.high,low:d.low,close:d.close})));
  kSeries.setMarkers(priceMarkers);

  const lastTime=plotData[plotData.length-1].date;
  priceMarkers.forEach(m=>{
    if(m.price===undefined) return;
    const lc=m.color==='#ef5350'?'rgba(239,83,80,0.5)':'rgba(38,166,154,0.5)';
    const ls=chart.addLineSeries({color:lc,lineWidth:2,lineStyle:1,lastValueVisible:false,priceLineVisible:false,crosshairMarkerVisible:false});
    ls.setData(m.time===lastTime?[{time:m.time,value:m.price}]:[{time:m.time,value:m.price},{time:lastTime,value:m.price}]);
  });

  const bbMid=chart.addLineSeries({color:'#FFD600',lineWidth:1,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  bbMid.setData(plotData.filter(d=>d.bb_mid!=null).map(d=>({time:d.date,value:d.bb_mid})));
  const bbUp=chart.addLineSeries({color:'rgba(255,255,255,0.35)',lineWidth:1,lineStyle:2,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  bbUp.setData(plotData.filter(d=>d.bb_up!=null).map(d=>({time:d.date,value:d.bb_up})));
  const bbDn=chart.addLineSeries({color:'rgba(255,255,255,0.35)',lineWidth:1,lineStyle:2,crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  bbDn.setData(plotData.filter(d=>d.bb_dn!=null).map(d=>({time:d.date,value:d.bb_dn})));

  const volS=chart.addHistogramSeries({priceScaleId:'vol',lastValueVisible:false,priceLineVisible:false});
  volS.setData(plotData.map(d=>({time:d.date,value:d.vol,color:d.vol>0?'rgba(239,83,80,0.8)':d.vol<0?'rgba(38,166,154,0.8)':'rgba(120,120,120,0.5)'})));
  chart.priceScale('vol').applyOptions({scaleMargins:{top:0.55,bottom:0.35},visible:false});

  const h1s=chart.addHistogramSeries({priceScaleId:'m1',lastValueVisible:false,priceLineVisible:false});
  h1s.setData(plotData.map(d=>({time:d.date,value:d.M1_hist,color:d.M1_hist>=0?'rgba(239,83,80,0.5)':'rgba(38,166,154,0.5)'})));
  const m1s=chart.addLineSeries({color:'#FFD600',lineWidth:1,priceScaleId:'m1',crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  m1s.setData(plotData.map(d=>({time:d.date,value:d.M1_macd})));
  m1s.setMarkers(macdMarkers1);
  const s1s=chart.addLineSeries({color:'#00E676',lineWidth:1,priceScaleId:'m1',crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  s1s.setData(plotData.map(d=>({time:d.date,value:d.M1_sig})));
  chart.priceScale('m1').applyOptions({scaleMargins:{top:0.62,bottom:0.25},visible:false});

  const h2s=chart.addHistogramSeries({priceScaleId:'m2',lastValueVisible:false,priceLineVisible:false});
  h2s.setData(plotData.map(d=>({time:d.date,value:d.M2_hist,color:d.M2_hist>=0?'rgba(239,83,80,0.5)':'rgba(38,166,154,0.5)'})));
  const m2s=chart.addLineSeries({color:'#FFD600',lineWidth:1,priceScaleId:'m2',crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  m2s.setData(plotData.map(d=>({time:d.date,value:d.M2_macd})));
  m2s.setMarkers(macdMarkers2);
  const s2s=chart.addLineSeries({color:'#00E676',lineWidth:1,priceScaleId:'m2',crosshairMarkerVisible:false,lastValueVisible:false,priceLineVisible:false});
  s2s.setData(plotData.map(d=>({time:d.date,value:d.M2_sig})));
  chart.priceScale('m2').applyOptions({scaleMargins:{top:0.80,bottom:0.02},visible:false});

  const dictByTime={};
  plotData.forEach(d=>dictByTime[d.date]=d);
  const legend=$('chart-legend');
  const DOW=['日','一','二','三','四','五','六'];

  function updateLegend(d){
    if(!d) return;
    const vc=d.vol>=0?'#ef5350':'#26a69a';
    legend.innerHTML=`
      <div class="legend-title">${sid} ${stockName} | ${d.date} 週${DOW[new Date(d.date+'T00:00:00').getDay()]}</div>
      <div class="legend-row"><span class="legend-lbl">開盤</span><span>${(d.open??0).toFixed(2)}</span></div>
      <div class="legend-row"><span class="legend-lbl">最高</span><span style="color:#ef5350">${(d.high??0).toFixed(2)}</span></div>
      <div class="legend-row"><span class="legend-lbl">最低</span><span style="color:#26a69a">${(d.low??0).toFixed(2)}</span></div>
      <div class="legend-row"><span class="legend-lbl">收盤</span><span style="font-weight:700">${(d.close??0).toFixed(2)}</span></div>
      <div class="legend-vol">買賣(${brName}) <span style="color:${vc};font-weight:700">${d.vol} 張</span></div>
      <div class="legend-macd">短 MACD: 柱 <span style="color:${(d.M1_hist??0)>=0?'#ef5350':'#26a69a'}">${(d.M1_hist??0).toFixed(2)}</span> | 快 <span style="color:#FFD600">${(d.M1_macd??0).toFixed(2)}</span> | 慢 <span style="color:#00E676">${(d.M1_sig??0).toFixed(2)}</span></div>
      <div class="legend-macd">長 MACD: 柱 <span style="color:${(d.M2_hist??0)>=0?'#ef5350':'#26a69a'}">${(d.M2_hist??0).toFixed(2)}</span> | 快 <span style="color:#FFD600">${(d.M2_macd??0).toFixed(2)}</span> | 慢 <span style="color:#00E676">${(d.M2_sig??0).toFixed(2)}</span></div>
    `;
  }

  // 預設顯示最後一根K線
  updateLegend(plotData[plotData.length-1]);

  chart.subscribeCrosshairMove(param=>{
    if(!param.time) return; // 不重置，保留最後一根
    let timeKey = param.time;
    if(typeof timeKey === 'object' && timeKey.year){
      timeKey = `${timeKey.year}-${String(timeKey.month).padStart(2,'0')}-${String(timeKey.day).padStart(2,'0')}`;
    } else if(typeof timeKey === 'number'){
      timeKey = new Date(timeKey*1000).toISOString().split('T')[0];
    } else {
      timeKey = String(timeKey);
    }
    const d = dictByTime[timeKey];
    if(d) updateLegend(d);
  });

  new ResizeObserver(()=>{
    if(currentChart){
      currentChart.applyOptions({width:container.clientWidth||window.innerWidth,height:container.clientHeight||400});
      currentChart.timeScale().fitContent();
    }
  }).observe(container);
  setTimeout(()=>{ if(currentChart) currentChart.timeScale().fitContent(); },200);
  currentChart = chart;
}

// ══════════════════════════════════════
// VIP 掃描清單
// ══════════════════════════════════════
function initVipPanel(){
  ['vip-days','vip-score','vip-pct'].forEach(id=>{
    const input=$(id), valEl=$(id+'-val');
    if(input&&valEl){ input.oninput=()=>valEl.textContent=input.value; }
  });
  $('vip-period').onchange = ()=>{ vipScanData=[]; $('vip-table-wrap').innerHTML='<div style="color:var(--text2);font-size:.75rem">週期已切換，請按「套用篩選」載入</div>'; };
  $('vip-apply-btn').onclick = ()=> loadAndFilterVip();
  $('vip-table-wrap').innerHTML='<div style="color:var(--text2);font-size:.75rem;padding:8px 0">請設定篩選條件後按「🔍 套用篩選」</div>';
}

async function loadAndFilterVip(){
  // 若還沒載入或週期切換了才重新抓
  const sheet=$('vip-period').value;
  if(!vipScanData.length || vipScanData._sheet!==sheet){
    $('vip-table-wrap').innerHTML='<div class="loading"><div class="spinner"></div>載入掃描資料中...</div>';
    try {
      const raw = await apiFetch(`/api/vip/scan?sheet=${sheet}`);
      const today=new Date();
      raw.forEach(row=>{
        let latest=null;
        const latestCol=row['最新訊號日'];
        if(latestCol){ latest=new Date(String(latestCol).replace(/\//g,'-')); }
        if(!latest||isNaN(latest)){
          const dates=(row['訊號摘要']||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/g)||[];
          dates.forEach(d=>{ const dt=new Date(d.replace(/\//g,'-')); if(!latest||dt>latest) latest=dt; });
        }
        row._latestDate=latest;
        let score=0;
        score+=Math.min(parseFloat(row['佔比%']||0),100)*0.4;
        const scale=row['金額(萬)']?parseFloat(row['金額(萬)']||0):parseFloat(row['張數']||0)/10;
        score+=Math.min(scale/500,1)*40;
        if(latest&&!isNaN(latest)){ const da=Math.floor((today-latest)/86400000); score+=Math.max(0,20-da*0.3); }
        const s=row['訊號摘要']||'';
        if((s.includes('MS')||s.includes('WS'))&&(s.includes('ML')||s.includes('WL'))) score+=10;
        row._score=Math.round(score*10)/10;
        const dir=row['方向']||'';
        const hasW=s.includes('WS')||s.includes('WL'), hasM=s.includes('MS')||s.includes('ML');
        const isBuy=dir==='買進', isSell=dir==='賣出';
        row._match=(hasW&&isBuy)||(hasM&&isSell)?'🟢最佳':hasM&&isBuy?'🟡參考':hasW&&isSell?'🔴注意':'⚪未知';
      });
      vipScanData = raw;
      vipScanData._sheet = sheet;
    } catch(e){
      $('vip-table-wrap').innerHTML=`<div style="color:var(--red);font-size:.75rem">${e.message}</div>`;
      return;
    }
  }
  applyVipFilter();
}

async function loadVipData(){ await loadAndFilterVip(); }

function applyVipFilter(){
  const days=parseInt($('vip-days').value)||60;
  const dir=$('vip-dir').value;
  const minScore=parseInt($('vip-score').value)||0;
  const minPct=parseInt($('vip-pct').value)||0;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days);

  vipFiltered=vipScanData.filter(r=>{
    if(r._latestDate&&r._latestDate<cutoff) return false;
    if(dir!=='全部'&&r['方向']!==dir) return false;
    if(r._score<minScore) return false;
    if(parseFloat(r['佔比%']||0)<minPct) return false;
    return true;
  }).sort((a,b)=>b._score-a._score);

  // 更新分點選單
  const brokerSel=$('vip-broker-sel');
  const curBr=brokerSel.value;
  brokerSel.innerHTML='<option>全部分點</option>';
  const counts={};
  vipFiltered.forEach(r=>{const b=r['分點名稱']||'';if(b)counts[b]=(counts[b]||0)+1;});
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([br,cnt])=>{
    brokerSel.appendChild(el('option',{value:br,text:`${br}（${cnt}）`}));
  });
  if([...brokerSel.options].find(o=>o.value===curBr)) brokerSel.value=curBr;
  brokerSel.onchange=renderVipTable;

  $('vip-caption').textContent=`近${days}天 強度≥${minScore} 共 ${vipFiltered.length} 檔`;
  renderVipTable();
}

function renderVipTable(){
  const selBr=$('vip-broker-sel').value;
  let rows=vipFiltered;
  if(selBr!=='全部分點') rows=rows.filter(r=>r['分點名稱']===selBr);
  const wrap=$('vip-table-wrap');
  if(!rows.length){ wrap.innerHTML='<div style="color:var(--text2);font-size:.75rem">無資料</div>'; return; }
  const tbl=el('table',{class:'vip-table'});
  const thead=el('thead');
  thead.appendChild(tr(th('📊'),th('🗂️'),th('代號'),th('名稱'),th('分點'),th('符合'),th('強度')));
  tbl.appendChild(thead);
  const tbody=el('tbody');
  rows.forEach(row=>{
    const sid=String(row['股票代號']||'').trim();
    const br=String(row['分點名稱']||'').trim();
    const key=`${sid}||${br}`;
    const loadCb=el('input',{type:'checkbox',title:'載入K線'});
    loadCb.onchange=()=>{ if(loadCb.checked){ switchToT4(sid,br); loadCb.checked=false; } };
    const selCb=el('input',{type:'checkbox'});
    if(vipSelected.has(key)) selCb.checked=true;
    selCb.onchange=()=>{ if(selCb.checked) vipSelected.add(key); else vipSelected.delete(key); };
    tbody.appendChild(tr(
      td(loadCb), td(selCb),
      td({text:sid}), td({text:String(row['股票名稱']||'')}),
      td({text:br}), td({text:row._match||''}), td({text:String(row._score)})
    ));
  });
  tbl.appendChild(tbody);
  wrap.innerHTML=''; wrap.appendChild(tbl);
  const selWrap=$('vip-sel-wrap');
  selWrap.innerHTML='';
  const addBtn=el('button',{class:'vip-add-btn',text:'🗂️ 勾選加入工作組'});
  addBtn.onclick=async()=>{
    if(!vipSelected.size){ alert('請先勾選 🗂️ 欄位'); return; }
    let added=0;
    vipSelected.forEach(key=>{
      const [s,b]=key.split('||');
      const dataRow=vipScanData.find(r=>String(r['股票代號']||'')==s&&String(r['分點名稱']||'')==b);
      const sname=dataRow?String(dataRow['股票名稱']||''):'';
      if(!workingGroup.find(w=>w['股票代號']===s&&w['追蹤分點']===b)){
        workingGroup.push({'股票代號':s,'股票名稱':sname,'追蹤分點':b}); added++;
      }
    });
    if(added){ await saveWorkingGroup(); renderWorkingGroup(); vipSelected.clear(); renderVipTable(); alert(`✅ 已加入 ${added} 檔`); }
    else alert('全部已在工作組中');
  };
  selWrap.appendChild(addBtn);
}
