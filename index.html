<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📡 stock-radar</title>
<script src="https://unpkg.com/lightweight-charts@3.8.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e1117;--bg2:#1a1d27;--bg3:#262b38;--border:#2e3347;--text:#d1d4dc;--text2:#8a8d9d;--accent:#2962FF;--red:#ef5350;--green:#26a69a;--yellow:#FFD600}
body{background:var(--bg);color:var(--text);font-family:"Microsoft JhengHei",sans-serif}
input,select,button{font-family:inherit}button{cursor:pointer}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{width:360px;padding:36px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}
.login-title{text-align:center;font-size:1.8rem;font-weight:700;color:var(--accent);margin-bottom:6px}
.login-sub{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:24px}
.form-group{margin-bottom:14px}.form-group label{display:block;font-size:.85rem;color:var(--text2);margin-bottom:5px}
.form-group input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.95rem}
.form-group input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:1rem;font-weight:600}.btn-primary:hover{background:#1a45cc}
.login-error{color:var(--red);font-size:.85rem;text-align:center;margin-top:8px;min-height:18px}
#app{display:none}
@media(min-width:769px){
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden}
  #app{position:fixed;top:0;left:0;right:0;bottom:0;flex-direction:row;overflow:hidden}
  #app.ready{display:flex}
  .app-layout{display:contents}
  .sidebar{width:280px;height:100%;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
  .sidebar-header{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
  .sidebar-nav{padding:8px;border-bottom:1px solid var(--border);flex-shrink:0}
  .nav-btn{display:block;width:100%;padding:9px 12px;margin-bottom:3px;background:transparent;border:none;border-radius:6px;color:var(--text2);text-align:left;font-size:.9rem}
  .nav-btn:hover{background:var(--bg3);color:var(--text)}.nav-btn.active{background:var(--accent);color:#fff}
  .sidebar-vip{flex:1;min-height:0;overflow-y:auto;padding:6px}
  .sidebar-logout{padding:10px;border-top:1px solid var(--border);flex-shrink:0}
  .btn-logout{width:100%;padding:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:.85rem}
  .btn-logout:hover{border-color:var(--red);color:var(--red)}
  .main-content{flex:1;min-width:0;height:100%;overflow-y:auto;padding:20px 24px;box-sizing:border-box}
  #mobile-vip-panel{display:none!important}
}
@media(max-width:768px){
  html,body{height:auto;overflow-y:auto}.app-layout{display:block}
  .sidebar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--bg2);border-bottom:2px solid var(--border)}
  .sidebar-header{padding:6px 10px;display:flex;align-items:center;gap:8px}
  .sidebar-user{font-size:.82rem;font-weight:600}.sidebar-role{font-size:.68rem;color:var(--text2)}
  .sidebar-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:4px 6px}
  .nav-btn{display:block;width:100%;padding:6px 4px;font-size:.7rem;white-space:nowrap;background:transparent;border:none;border-radius:5px;color:var(--text2);text-align:center;overflow:hidden;text-overflow:ellipsis}
  .nav-btn.active{background:var(--accent);color:#fff}
  .sidebar-vip{display:none}.sidebar-logout{padding:4px 6px}
  .btn-logout{padding:5px 12px;font-size:.78rem;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2)}
  .main-content{padding:8px;padding-top:110px}#mobile-vip-panel{display:block}
  .login-box{width:92%;padding:24px 18px}
}
.section-title{font-size:1.1rem;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ctrl-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end}
.ctrl-group{display:flex;flex-direction:column;gap:4px}.ctrl-group label{font-size:.8rem;color:var(--text2)}
.ctrl-group select,.ctrl-group input[type=text],.ctrl-group input[type=date]{padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.88rem;min-width:120px}
.ctrl-group select:focus,.ctrl-group input:focus{outline:none;border-color:var(--accent)}
.radio-group{display:flex;gap:5px;flex-wrap:wrap}
.radio-group label{padding:6px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:.83rem;cursor:pointer}
.radio-group input[type=radio]{display:none}.radio-group input[type=radio]:checked+label{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-search{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-weight:600;font-size:.88rem}.btn-search:hover{background:#1a45cc}
.btn-secondary{padding:7px 14px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:.83rem}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:768px){.ctrl-row{flex-direction:column;gap:8px}.ctrl-group{width:100%}.ctrl-group select,.ctrl-group input[type=text],.ctrl-group input[type=date]{width:100%;min-width:unset}}
table{width:100%;border-collapse:collapse;font-size:.83rem}
th{padding:7px 9px;background:var(--bg3);color:var(--text2);text-align:left;font-weight:600;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:6px 9px;border-bottom:1px solid var(--border);white-space:nowrap}
tr:hover td{background:rgba(255,255,255,.03)}
.link-btn{color:var(--accent);text-decoration:none;font-size:.78rem;padding:2px 5px;border:1px solid var(--accent);border-radius:4px}.link-btn:hover{background:var(--accent);color:#fff}
@media(max-width:768px){table{font-size:.74rem}th,td{padding:5px 7px}}
.status-msg{padding:10px 14px;border-radius:6px;margin-bottom:10px;font-size:.87rem}
.status-info{background:rgba(41,98,255,.1);border:1px solid rgba(41,98,255,.3);color:#90b0ff}
.status-error{background:rgba(239,83,80,.1);border:1px solid rgba(239,83,80,.3);color:#ff9090}
.status-success{background:rgba(38,166,154,.1);border:1px solid rgba(38,166,154,.3);color:#90e0d8}
.loading{display:flex;align-items:center;gap:10px;color:var(--text2);padding:20px;justify-content:center}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.chart-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;padding:10px;background:var(--bg2);border-radius:8px;margin-bottom:10px}
#chart-wrapper{position:relative;width:100%;height:calc(100vh - 240px);min-height:500px;background:var(--bg);border-radius:8px;overflow:hidden}
#chart-container{width:100%;height:100%}
.chart-legend{position:absolute;left:10px;top:10px;z-index:99;background:rgba(14,17,23,.92);padding:8px 12px;border-radius:6px;border:1px solid var(--border);font-size:.78rem;pointer-events:none;max-width:240px}
.legend-title{color:var(--accent);font-weight:700;font-size:.85rem;margin-bottom:5px;border-bottom:1px solid var(--border);padding-bottom:3px}
.legend-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:2px}.legend-lbl{color:var(--text2)}
.legend-vol{margin-top:5px;padding-top:5px;border-top:1px dashed var(--border);font-weight:700}
.legend-macd{margin-top:3px;font-size:.72rem;color:var(--text2);line-height:1.4}
@media(max-width:768px){.chart-controls{flex-direction:column;gap:6px}#chart-wrapper{height:75vh;min-height:480px}.chart-legend{font-size:.72rem;max-width:200px;padding:6px 10px}}
.list-tab-summary{cursor:pointer;padding:8px 12px;font-size:.88rem;font-weight:600;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);list-style:none;display:flex;align-items:center;gap:6px;user-select:none;margin-bottom:4px}
.list-tab-summary::-webkit-details-marker{display:none}details[open] .list-tab-summary{border-color:var(--accent);color:var(--accent)}
/* VIP panel */
.vip-form{display:flex;flex-direction:column;gap:6px;padding:6px}
.vip-form label{font-size:.75rem;color:var(--text2)}
.vip-form select{width:100%}
.vip-form input[type=range]{width:100%;accent-color:var(--accent)}
.vip-form input[type=date]{width:100%;padding:5px 7px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.8rem}
.vip-row{display:flex;justify-content:space-between;font-size:.74rem;color:var(--text2)}
.vip-apply-btn{width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:.8rem;font-weight:600;margin-top:4px}
.vip-mode-bar{display:flex;gap:4px;margin-bottom:6px}
.vip-mode-btn{flex:1;padding:5px 0;font-size:.78rem;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2)}
.vip-mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.vip-compare-box{background:rgba(41,98,255,0.06);border:1px solid rgba(41,98,255,0.2);border-radius:5px;padding:6px;margin-bottom:4px}
.vip-compare-label{font-size:.72rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.vip-table{width:100%;border-collapse:collapse;font-size:.74rem}
.vip-table th{color:var(--text2);padding:4px;border-bottom:1px solid var(--border);font-weight:600;position:sticky;top:0;z-index:10;background:var(--bg3)}
.vip-table td{padding:4px;border-bottom:1px solid var(--border)}
.vip-add-btn{width:100%;padding:6px;margin-top:6px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text2);font-size:.75rem}
.vip-add-btn:hover{border-color:var(--accent);color:var(--accent)}
/* 比對標記 */
.tag-cont{background:rgba(255,214,0,0.15);color:#FFD600;padding:1px 5px;border-radius:3px;font-size:.72rem;font-weight:600}
.tag-new{background:rgba(38,166,154,0.15);color:#26a69a;padding:1px 5px;border-radius:3px;font-size:.72rem;font-weight:600}
.tag-exit{background:rgba(120,120,120,0.15);color:#888;padding:1px 5px;border-radius:3px;font-size:.72rem;font-weight:600}
#vip-overlay{display:none;position:fixed;top:0;bottom:0;left:280px;right:0;background:var(--bg);border-left:2px solid var(--accent);z-index:300;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,.4)}
#vip-overlay.open{display:flex!important}
#vip-overlay-inner{display:flex;flex-direction:column;height:100%;padding:14px 20px;gap:8px;box-sizing:border-box;overflow:hidden}
#vip-overlay-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-bottom:8px;border-bottom:1px solid var(--border)}
#vip-overlay .vip-top-bar{flex-shrink:0}
#vip-overlay #vip-table-wrap{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column}
#vip-overlay #vip-table-wrap .vip-scroll-wrap{flex:1;overflow-y:auto;min-height:0}
#vip-overlay #vip-table-wrap table{width:100%;border-collapse:collapse}
@media(max-width:768px){#vip-overlay{display:none!important}}
.note-input{background:transparent;border:none;color:var(--text);font-size:.83rem;width:100%;outline:none}
.note-input:focus{border-bottom:1px solid var(--accent)}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">📡 stock-radar</div>
    <div class="login-sub">分點追蹤平台</div>
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="your@email.com" autocomplete="username"></div>
    <div class="form-group"><label>密碼</label><input type="password" id="login-pwd" placeholder="輸入密碼" autocomplete="current-password"></div>
    <button class="btn-primary" id="login-btn">🔐 登入</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="app-layout">
    <div class="sidebar">
      <div class="sidebar-header"><div class="sidebar-user" id="sb-username">載入中...</div><div class="sidebar-role" id="sb-role"></div></div>
      <div class="sidebar-nav">
        <button class="nav-btn active" data-tab="t1">🚀 特定分點</button>
        <button class="nav-btn" data-tab="t2">📊 股票代號</button>
        <button class="nav-btn" data-tab="t3">📍 地緣券商</button>
        <button class="nav-btn" data-tab="t4">📈 K線圖</button>
      </div>
      <!-- VIP 掃描清單 sidebar -->
      <div id="vip-panel" style="display:none" class="sidebar-vip">
        <div style="padding:8px 10px;font-size:.85rem;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);margin-bottom:6px">📡 VIP 掃描清單</div>
        <div class="vip-form">
          <!-- 模式切換 -->
          <div class="vip-mode-bar">
            <button class="vip-mode-btn active" id="vip-mode-normal" onclick="setVipMode('normal')">📋 篩選</button>
            <button class="vip-mode-btn" id="vip-mode-compare" onclick="setVipMode('compare')">🔍 比對</button>
          </div>

          <div><label>K線週期</label><select id="vip-period"><option value="ScanResult">日線</option><option value="ScanResult_W">週線</option></select></div>

          <!-- 普通模式：起訖日期 -->
          <div id="vip-normal-dates">
            <div><label>起始日</label><input type="date" id="vip-start"></div>
            <div><label>結束日</label><input type="date" id="vip-end"></div>
          </div>

          <!-- 比對模式：A起始、B起始、共用結束日 -->
          <div id="vip-compare-dates" style="display:none">
            <div class="vip-compare-box">
              <div class="vip-compare-label">A 區間（較早）</div>
              <div><label>A 起始日</label><input type="date" id="vip-a-start"></div>
            </div>
            <div class="vip-compare-box" style="border-color:rgba(38,166,154,0.3);background:rgba(38,166,154,0.05)">
              <div class="vip-compare-label" style="color:var(--green)">B 區間（較近）</div>
              <div><label>B 起始日</label><input type="date" id="vip-b-start"></div>
            </div>
            <div><label>共用結束日</label><input type="date" id="vip-end-cmp"></div>
          </div>

          <div><label>方向</label><select id="vip-dir"><option>全部</option><option>買進</option><option>賣出</option></select></div>
          <div><label>最低金額(萬)</label><input type="number" id="vip-score" value="0" min="0" step="100" style="width:100%;padding:5px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.8rem"></div>
          <div><label>最低佔比%</label><input type="number" id="vip-pct" value="60" min="0" max="100" step="1" style="width:100%;padding:5px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.8rem"></div>
          <div><label>最低張數</label><input type="number" id="vip-vol" value="20" min="0" step="10" style="width:100%;padding:5px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.8rem"></div>
          <div id="vip-broker-wrap"><label>分點過濾</label><select id="vip-broker-sel"><option>全部分點</option></select></div>
          <div id="vip-sort-wrap"><label>排序依據</label><select id="vip-sort"><option value="股票名稱">股票名稱</option><option value="_match">符合度</option><option value="張數">張數</option><option value="金額(萬)">金額(萬)</option><option value="佔比%">佔比%</option><option value="最新訊號日">最新訊號日</option></select></div>
          <button class="vip-apply-btn" id="vip-apply-btn">🔍 套用篩選</button>
        </div>
        <div id="vip-caption" style="font-size:.75rem;color:var(--text2);margin:4px 0 0"></div>
      </div>
      <div class="sidebar-logout"><button class="btn-logout" id="logout-btn">登出</button></div>
    </div>

    <div class="main-content" id="main-content">
      <!-- 手機版 VIP -->
      <div id="mobile-vip-panel" style="display:none;margin-bottom:10px">
        <details><summary class="list-tab-summary">📡 VIP 掃描清單</summary>
          <div style="padding:6px 0">
            <div class="vip-form">
              <div class="vip-mode-bar">
                <button class="vip-mode-btn active" id="m-vip-mode-normal" onclick="setMobileVipMode('normal')">📋 篩選</button>
                <button class="vip-mode-btn" id="m-vip-mode-compare" onclick="setMobileVipMode('compare')">🔍 比對</button>
              </div>
              <div><label>K線週期</label><select id="m-vip-period"><option value="ScanResult">日線</option><option value="ScanResult_W">週線</option></select></div>
              <div id="m-vip-normal-dates">
                <div><label>起始日</label><input type="date" id="m-vip-start"></div>
                <div><label>結束日</label><input type="date" id="m-vip-end"></div>
              </div>
              <div id="m-vip-compare-dates" style="display:none">
                <div class="vip-compare-box"><div class="vip-compare-label">A 區間（較早）</div><div><label>A 起始日</label><input type="date" id="m-vip-a-start"></div></div>
                <div class="vip-compare-box" style="border-color:rgba(38,166,154,0.3);background:rgba(38,166,154,0.05)"><div class="vip-compare-label" style="color:var(--green)">B 區間（較近）</div><div><label>B 起始日</label><input type="date" id="m-vip-b-start"></div></div>
                <div><label>共用結束日</label><input type="date" id="m-vip-end-cmp"></div>
              </div>
              <div><label>方向</label><select id="m-vip-dir"><option>全部</option><option>買進</option><option>賣出</option></select></div>
              <div><label>最低金額(萬)</label><input type="number" id="m-vip-score" value="0" min="0" step="100" style="width:100%;padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.85rem"></div>
              <div><label>最低佔比%</label><input type="number" id="m-vip-pct" value="60" min="0" max="100" step="1" style="width:100%;padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.85rem"></div>
              <div><label>最低張數</label><input type="number" id="m-vip-vol" value="20" min="0" step="10" style="width:100%;padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:.85rem"></div>
              <div><label>分點過濾</label><select id="m-vip-broker-sel"><option>全部分點</option></select></div>
              <div><label>排序依據</label><select id="m-vip-sort"><option value="股票名稱">股票名稱</option><option value="_match">符合度</option><option value="張數">張數</option><option value="金額(萬)">金額(萬)</option><option value="佔比%">佔比%</option><option value="最新訊號日">最新訊號日</option></select></div>
              <button class="vip-apply-btn" id="m-vip-apply-btn">🔍 套用篩選</button>
            </div>
            <div id="m-vip-caption" style="font-size:.75rem;color:var(--text2);margin:4px 0"></div>
            <div id="m-vip-table-wrap"></div><div id="m-vip-sel-wrap" style="margin-top:6px"></div>
          </div>
        </details>
      </div>

      <!-- TAB1 -->
      <div id="tab-t1">
        <div class="section-title">🚀 特定分點</div>
        <div class="ctrl-row">
          <div class="ctrl-group"><label>券商</label><select id="t1-hq" style="min-width:160px"></select></div>
          <div class="ctrl-group"><label>分點</label><input type="text" id="t1-br" list="t1-br-list" placeholder="🔍 搜尋分點..." style="min-width:180px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.88rem"><datalist id="t1-br-list"></datalist></div>
          <div class="ctrl-group"><label>起始</label><input type="date" id="t1-sd"></div>
          <div class="ctrl-group"><label>結束</label><input type="date" id="t1-ed"></div>
        </div>
        <div class="ctrl-row">
          <div class="ctrl-group"><label>統計單位</label><div class="radio-group"><input type="radio" name="t1-unit" id="t1-shares" value="shares" checked><label for="t1-shares">張數</label><input type="radio" name="t1-unit" id="t1-amount" value="amount"><label for="t1-amount">金額</label></div></div>

<script>
const API='https://stock-radar-api-ky4l.onrender.com';
let token=localStorage.getItem('sr_token')||'',username=localStorage.getItem('sr_username')||'',userRole=localStorage.getItem('sr_role')||'';
let brokerTree={},brokerMap={},geoMap={},watchlist=[],workingGroup=[];
let vipScanData=[],vipFiltered=[],vipSelected=new Set(),vipAllSelected=false;
let currentChart=null,lastStockName={},currentTab='t1';
let vipMode='normal'; // 'normal' | 'compare'
let mobileVipMode='normal';

const $=id=>document.getElementById(id);
const el=(tag,...args)=>{const e=document.createElement(tag);const attr=(args[0]&&typeof args[0]==='object'&&!(args[0] instanceof Node))?args.shift():{};Object.entries(attr).forEach(([k,v])=>{if(k==='class')e.className=v;else if(k==='html')e.innerHTML=v;else if(k==='text')e.textContent=v;else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v)});args.forEach(c=>{if(c==null)return;if(typeof c==='string')e.appendChild(document.createTextNode(c));else if(c instanceof Node)e.appendChild(c)});return e};
const td=(...a)=>el('td',...a),th=t=>el('th',{text:t}),tr=(...tds)=>{const r=el('tr');tds.forEach(t=>r.appendChild(t));return r};
function showStatus(id,msg,type='info'){const d=$(id);if(!d)return;d.innerHTML=msg?`<div class="status-msg status-${type}">${msg}</div>`:''}
function fmtDate(d){return d.toISOString().split('T')[0]}
function today(){return fmtDate(new Date())}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return fmtDate(d)}
async function apiFetch(path,opts={}){const headers={'Content-Type':'application/json'};if(token)headers['Authorization']=`Bearer ${token}`;const res=await fetch(API+path,{...opts,headers:{...headers,...(opts.headers||{})}});if(res.status===401){doLogout();throw new Error('未登入')}if(!res.ok){const err=await res.json().catch(()=>({detail:res.statusText}));throw new Error(err.detail||res.statusText)}return res.json()}

// ── LOGIN ──
$('login-btn').onclick=async()=>{const email=$('login-email').value.trim(),pwd=$('login-pwd').value;$('login-error').textContent='';if(!email||!pwd){$('login-error').textContent='請輸入 Email 和密碼';return}try{$('login-btn').textContent='登入中...';$('login-btn').disabled=true;const data=await fetch(API+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})});if(!data.ok){const err=await data.json();throw new Error(err.detail||'登入失敗')}const res=await data.json();token=res.token;username=res.username;userRole=res.role;localStorage.setItem('sr_token',token);localStorage.setItem('sr_username',username);localStorage.setItem('sr_role',userRole);await initApp()}catch(e){$('login-error').textContent=e.message}finally{$('login-btn').textContent='🔐 登入';$('login-btn').disabled=false}};
$('login-pwd').addEventListener('keydown',e=>{if(e.key==='Enter')$('login-btn').click()});
function doLogout(){localStorage.removeItem('sr_token');localStorage.removeItem('sr_username');localStorage.removeItem('sr_role');token='';username='';userRole='';$('app').classList.remove('ready');$('app').style.display='none';$('login-screen').style.display='flex'}
$('logout-btn').onclick=doLogout;

// ── INIT ──
async function initApp(){
  $('login-screen').style.display='none';
  $('app').classList.add('ready');
  if(window.innerWidth<=768)$('app').style.display='block';
  $('sb-username').textContent=username;$('sb-role').textContent=userRole==='vip'?'⭐ VIP 會員':userRole==='admin'?'🔧 管理員':'👤 會員';
  const mc=$('main-content'),ld=document.createElement('div');ld.id='broker-loading';ld.className='status-msg status-info';ld.style.margin='0 0 10px';ld.innerHTML='<div class="loading"><div class="spinner"></div>正在連線伺服器，首次啟動約需 30~60 秒...</div>';mc.insertBefore(ld,mc.firstChild);
  try{const [tree,map,geo]=await Promise.all([apiFetch('/api/brokers/tree'),apiFetch('/api/brokers/map'),apiFetch('/api/brokers/geo')]);brokerTree=tree;brokerMap=map;geoMap=geo;buildT1Selects();buildT3Selects();buildT4BrSelect();ld.remove()}catch(e){ld.className='status-msg status-error';ld.innerHTML=`⚠️ 伺服器連線失敗。(${e.message})`}
  ['t1','t2','t3'].forEach(t=>{$(t+'-sd').value=daysAgo(7);$(t+'-ed').value=today()});
  await loadWatchlist();await loadWorkingGroup();renderWatchlist();renderWorkingGroup();
  if(userRole==='vip'){if(window.innerWidth>768)$('vip-panel').style.display='block';initVipPanel()}
  function adjPad(){if(window.innerWidth<=768){const sb=document.querySelector('.sidebar'),mc=document.querySelector('.main-content');if(sb&&mc)mc.style.paddingTop=(sb.offsetHeight+8)+'px';if(userRole==='vip')$('mobile-vip-panel').style.display='block'}else{const mc=document.querySelector('.main-content');if(mc)mc.style.paddingTop='';$('mobile-vip-panel').style.display='none'}}
  adjPad();new ResizeObserver(adjPad).observe(document.querySelector('.sidebar'));window.addEventListener('resize',adjPad);
  if(userRole==='vip')initMobileVipPanel();
  const ocb=$('vip-overlay-close');if(ocb)ocb.onclick=()=>{const o=$('vip-overlay');o.classList.remove('open');o.style.display=''};
  document.querySelectorAll('.nav-btn').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');const tab=btn.dataset.tab;currentTab=tab;['t1','t2','t3','t4'].forEach(t=>{$('tab-'+t).style.display=t===tab?'':'none'})}});
}

// ── BROKER SELECTS ──
function buildT1Selects(){const hqSel=$('t1-hq');hqSel.innerHTML='';Object.keys(brokerTree).sort().forEach(hq=>hqSel.appendChild(el('option',{value:hq,text:hq})));hqSel.onchange=()=>{const list=$('t1-br-list');if(!list)return;list.innerHTML='';const branches=brokerTree[hqSel.value]?.branches||[];[...branches].sort().forEach(b=>{const o=document.createElement('option');o.value=b;list.appendChild(o)});$('t1-br').value=branches.length>0?[...branches].sort()[0]:''};hqSel.dispatchEvent(new Event('change'))}
function buildT3Selects(){const locSel=$('t3-loc');locSel.innerHTML='';Object.keys(geoMap).sort().forEach(loc=>locSel.appendChild(el('option',{value:loc,text:loc})));locSel.onchange=()=>{const list=$('t3-br-list');if(!list)return;list.innerHTML='';const branches=(geoMap[locSel.value]||[]).sort();branches.forEach(b=>{const o=document.createElement('option');o.value=b;list.appendChild(o)});$('t3-br').value=branches.length>0?branches[0]:''};locSel.dispatchEvent(new Event('change'))}
function buildT4BrSelect(){const list=$('t4-br-list');list.innerHTML='';const sorted=Object.keys(brokerMap).sort();sorted.forEach(br=>{const o=document.createElement('option');o.value=br;list.appendChild(o)});if(sorted.length>0&&!$('t4-br').value)$('t4-br').value=sorted[0]}

// ── TAB1 ──
$('t1-search-btn').onclick=async()=>{const hqName=$('t1-hq').value,brName=$('t1-br').value,hqData=brokerTree[hqName];if(!hqData){showStatus('t1-status','找不到券商','error');return}const hqId=hqData.bid,brId=brokerMap[brName]?.br_id||hqId,sd=$('t1-sd').value,ed=$('t1-ed').value,unit=document.querySelector('input[name=t1-unit]:checked').value,mode=document.querySelector('input[name=t1-mode]:checked').value,pct=parseFloat($('t1-pct').value)||95;showStatus('t1-status','<div class="loading"><div class="spinner"></div>查詢中...</div>');$('t1-buy-wrap').innerHTML='';$('t1-sell-wrap').innerHTML='';try{const data=await apiFetch(`/api/broker/stocks?hq_id=${hqId}&br_id=${brId}&start=${sd}&end=${ed}&unit=${unit}`);const colB=unit==='amount'?'買進金額':'買進張數',colS=unit==='amount'?'賣出金額':'賣出張數';let buyList,sellList;if(mode==='strict'){buyList=data.filter(r=>r[colB]>0&&r[colS]===0);sellList=data.filter(r=>r[colS]>0&&r[colB]===0)}else{buyList=data.filter(r=>r['買%']>=pct);sellList=data.filter(r=>r['賣%']>=pct)}buyList.sort((a,b)=>b[colB]-a[colB]);sellList.sort((a,b)=>b[colS]-a[colS]);showStatus('t1-status','');renderStockTable('t1-buy-wrap',buyList,colB,colS,brName,brId,'🔴 買進','buy');renderStockTable('t1-sell-wrap',sellList,colB,colS,brName,brId,'🟢 賣出','sell')}catch(e){showStatus('t1-status',e.message,'error')}};
function renderStockTable(wrapId,list,colB,colS,brName,brId,title,side){const wrap=$(wrapId);if(!list.length){wrap.innerHTML=`<div style="color:var(--text2);font-size:.85rem;padding:8px 0">${title} — 無資料</div>`;return}const tbl=el('table',{class:'wl-table'}),thead=el('thead');thead.appendChild(tr(th('代號'),th('名稱'),th('買進'),th('賣出'),th('佔%'),th('K線'),th('繪圖')));tbl.appendChild(thead);const tbody=el('tbody');list.forEach(row=>{const sid=String(row['股票代號']||'').trim(),sname=String(row['股票名稱']||'').trim().replace(/^\d+[A-Za-z]?\s*/,'').trim()||String(row['股票名稱']||'').trim();const kUrl=`https://fubon-ebrokerdj.fbs.com.tw/z/zc/zcw/zcw1_${sid}.djhtm`,drawBtn=el('button',{class:'link-btn',text:'📊'});drawBtn.onclick=()=>switchToT4(sid,brName);tbody.appendChild(tr(td({text:sid}),td({text:sname}),td({text:(row[colB]||0).toLocaleString()}),td({text:(row[colS]||0).toLocaleString()}),td({text:(side==='buy'?row['買%']:row['賣%'])+'%'}),td(el('a',{class:'link-btn',href:kUrl,target:'_blank',text:'📈'})),td(drawBtn)))});tbl.appendChild(tbody);wrap.innerHTML=`<div style="font-weight:600;margin:12px 0 6px">${title} — 共 ${list.length} 檔</div>`;wrap.appendChild(tbl)}

// ── TAB2 ──
$('t2-search-btn').onclick=async()=>{const sid=$('t2-sid').value.trim().toUpperCase(),sd=$('t2-sd').value,ed=$('t2-ed').value,mode=document.querySelector('input[name=t2-mode]:checked').value,pct=parseFloat($('t2-pct').value)||95,vol=parseFloat($('t2-vol').value)||0;showStatus('t2-status','<div class="loading"><div class="spinner"></div>查詢中...</div>');$('t2-buy-wrap').innerHTML='';$('t2-sell-wrap').innerHTML='';try{const data=await apiFetch(`/api/stock/brokers?sid=${sid}&start=${sd}&end=${ed}`);let buyList,sellList;if(mode==='strict'){buyList=data.filter(r=>r['買']>=vol&&r['賣']===0);sellList=data.filter(r=>r['賣']>=vol&&r['買']===0)}else{buyList=data.filter(r=>r['買進%']>=pct&&r['買']>=vol);sellList=data.filter(r=>r['賣出%']>=pct&&r['賣']>=vol)}buyList.sort((a,b)=>b['買']-a['買']);sellList.sort((a,b)=>b['賣']-a['賣']);showStatus('t2-status','');renderBrokerTable('t2-buy-wrap',buyList,sid,'🔴 買進分點');renderBrokerTable('t2-sell-wrap',sellList,sid,'🟢 賣出分點')}catch(e){showStatus('t2-status',e.message,'error')}};
function renderBrokerTable(wrapId,list,sid,title){const wrap=$(wrapId);if(!list.length){wrap.innerHTML=`<div style="color:var(--text2);font-size:.85rem;padding:8px 0">${title} — 無資料</div>`;return}const tbl=el('table',{class:'wl-table'}),thead=el('thead'),hr=el('tr');['券商','買','賣','買進%','繪圖'].forEach(t=>hr.appendChild(el('th',{text:t})));thead.appendChild(hr);tbl.appendChild(thead);const tbody=el('tbody');list.forEach(row=>{const brName=row['券商'],r=el('tr');r.appendChild(el('td',{text:brName}));r.appendChild(el('td',{text:(row['買']||0).toLocaleString()}));r.appendChild(el('td',{text:(row['賣']||0).toLocaleString()}));r.appendChild(el('td',{text:row['買進%']+'%'}));const d=el('td');d.appendChild(el('button',{class:'link-btn',text:'📊',onclick:()=>switchToT4(sid,brName)}));r.appendChild(d);tbody.appendChild(r)});tbl.appendChild(tbody);wrap.innerHTML=`<div style="font-weight:600;margin:12px 0 6px">${title} — 共 ${list.length} 筆</div>`;wrap.appendChild(tbl)}

// ── TAB3 ──
$('t3-search-btn').onclick=async()=>{const brName=$('t3-br').value,brInfo=brokerMap[brName];if(!brInfo){showStatus('t3-status','找不到分點資料','error');return}const sd=$('t3-sd').value,ed=$('t3-ed').value,unit=document.querySelector('input[name=t3-unit]:checked').value,mode=document.querySelector('input[name=t3-mode]:checked').value,pct=parseFloat($('t3-pct').value)||95;showStatus('t3-status','<div class="loading"><div class="spinner"></div>查詢中...</div>');$('t3-buy-wrap').innerHTML='';$('t3-sell-wrap').innerHTML='';try{const data=await apiFetch(`/api/broker/stocks?hq_id=${brInfo.hq_id}&br_id=${brInfo.br_id}&start=${sd}&end=${ed}&unit=${unit}`);const colB=unit==='amount'?'買進金額':'買進張數',colS=unit==='amount'?'賣出金額':'賣出張數';let buyList,sellList;if(mode==='strict'){buyList=data.filter(r=>r[colB]>0&&r[colS]===0);sellList=data.filter(r=>r[colS]>0&&r[colB]===0)}else{buyList=data.filter(r=>r['買%']>=pct);sellList=data.filter(r=>r['賣%']>=pct)}buyList.sort((a,b)=>b[colB]-a[colB]);sellList.sort((a,b)=>b[colS]-a[colS]);showStatus('t3-status','');renderStockTable('t3-buy-wrap',buyList,colB,colS,brName,brInfo.br_id,`🔴 ${brName} 買進`,'buy');renderStockTable('t3-sell-wrap',sellList,colB,colS,brName,brInfo.br_id,`🟢 ${brName} 賣出`,'sell')}catch(e){showStatus('t3-status',e.message,'error')}};

// ── TAB4 ──

function _enrichVipRows(rows){
  const todayMs=Date.UTC(..._todayParts());
  rows.forEach(row=>{
    let ls=null;
    const lc=row['最新訊號日'];if(lc)ls=String(lc).replace(/\//g,'-').slice(0,10);
    if(!ls){const dates=(row['訊號摘要']||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/g)||[];dates.forEach(d=>{const ds=d.replace(/\//g,'-');if(!ls||ds>ls)ls=ds})}
    row._latestDate=ls;
    let score=0;score+=Math.min(parseFloat(row['佔比%']||0),100)*0.4;
    const amt=parseFloat(row['金額(萬)']||0),vol=parseFloat(row['張數']||0),scale=(amt>0)?amt:(vol/10);
    score+=Math.min(scale/500,1)*40;
    if(ls){const[y,mo,dd]=ls.split('-').map(Number);const da=Math.floor((todayMs-Date.UTC(y,mo-1,dd))/86400000);score+=Math.max(0,20-da*0.3)}
    const s=row['訊號摘要']||'';
    if((s.includes('MS')||s.includes('WS'))&&(s.includes('ML')||s.includes('WL')))score+=10;
    row._score=Math.round(score*10)/10;
    const dir=row['方向']||'',hasW=s.includes('WS')||s.includes('WL'),hasM=s.includes('MS')||s.includes('ML'),isBuy=dir==='買進',isSell=dir==='賣出';
    row._match=(hasW&&isBuy)||(hasM&&isSell)?'🟢最佳':hasM&&isBuy?'🟡參考':hasW&&isSell?'🔴注意':'⚪未知';
  });
}

function _todayParts(){const t=new Date();return[t.getFullYear(),t.getMonth(),t.getDate()]}

function applyVipFilter(){
  const startDate=$('vip-start').value;
  const endDate=$('vip-end').value;
  const dir=$('vip-dir').value;
  const minAmt=parseFloat($('vip-score').value)||0;
  const minPct=parseFloat($('vip-pct').value)||0;
  const minVol=parseFloat($('vip-vol').value)||0;

  vipFiltered=vipScanData.filter(r=>{
    if(r._latestDate){
      if(startDate&&r._latestDate<startDate)return false;
      if(endDate&&r._latestDate>endDate)return false;
    }
    if(dir!=='全部'&&r['方向']!==dir)return false;
    if(parseFloat(r['金額(萬)']||0)<minAmt)return false;
    if(parseFloat(r['佔比%']||0)<minPct)return false;
    if(parseFloat(r['張數']||0)<minVol)return false;
    return true;
  }).sort((a,b)=>{
    const sortBy=$('vip-sort')?.value||'張數';
    if(sortBy==='股票名稱')return String(a['股票名稱']||'').localeCompare(String(b['股票名稱']||''));
    if(sortBy==='最新訊號日')return(b._latestDate||'')>(a._latestDate||'')?1:-1;
    if(sortBy==='_match')return String(a._match||'').localeCompare(String(b._match||''));
    const va=parseFloat(a[sortBy]??0)||a._score||0,vb=parseFloat(b[sortBy]??0)||b._score||0;return vb-va;
  });

  const brokerSel=$('vip-broker-sel'),curBr=brokerSel.value;
  brokerSel.innerHTML='<option>全部分點</option>';
  const counts={};vipFiltered.forEach(r=>{const b=r['分點名稱']||'';if(b)counts[b]=(counts[b]||0)+1});
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([br,cnt])=>brokerSel.appendChild(el('option',{value:br,text:`${br}（${cnt}）`})));
  if([...brokerSel.options].find(o=>o.value===curBr))brokerSel.value=curBr;
  brokerSel.onchange=renderVipTable;

  $('vip-caption').textContent=`${startDate}～${endDate} 共 ${vipFiltered.length} 檔`;
  if(window.innerWidth>768){const ov=$('vip-overlay');ov.classList.add('open');ov.style.display='flex';$('vip-overlay-caption').textContent=`${startDate}～${endDate} 共 ${vipFiltered.length} 檔`}
  renderVipTable();
}

async function runVipCompare(){
  const sheet=$('vip-period').value;
  if(!vipScanData.length||vipScanData._sheet!==sheet){
    $('vip-table-wrap').innerHTML='<div class="loading"><div class="spinner"></div>載入...</div>';
    try{const raw=await apiFetch(`/api/vip/scan?sheet=${sheet}`);_enrichVipRows(raw);vipScanData=raw;vipScanData._sheet=sheet}
    catch(e){$('vip-table-wrap').innerHTML=`<div style="color:var(--red);font-size:.75rem">${e.message}</div>`;return}
  }

  const aStart=$('vip-a-start').value;
  const bStart=$('vip-b-start').value;
  const endDate=$('vip-end-cmp').value;
  const minAmt=parseFloat($('vip-score').value)||0;
  const minPct=parseFloat($('vip-pct').value)||0;
  const minVol=parseFloat($('vip-vol').value)||0;
  const dir=$('vip-dir').value;

  function filterRange(start,end){
    return vipScanData.filter(r=>{
      if(r._latestDate){if(start&&r._latestDate<start)return false;if(end&&r._latestDate>end)return false}
      if(dir!=='全部'&&r['方向']!==dir)return false;
      if(parseFloat(r['金額(萬)']||0)<minAmt)return false;
      if(parseFloat(r['佔比%']||0)<minPct)return false;
      if(parseFloat(r['張數']||0)<minVol)return false;
      return true;
    });
  }

  const aRows=filterRange(aStart,endDate);
  const bRows=filterRange(bStart,endDate);

  // 建 key Set（股票代號||分點名稱）
  const aKeys=new Set(aRows.map(r=>`${r['股票代號']}||${r['分點名稱']}`));
  const bKeys=new Set(bRows.map(r=>`${r['股票代號']}||${r['分點名稱']}`));

  // 合併：B + A 中只有A的
  const seen=new Set();
  const compareResult=[];
  bRows.forEach(r=>{
    const k=`${r['股票代號']}||${r['分點名稱']}`;
    if(seen.has(k))return;seen.add(k);
    compareResult.push({...r,_cmp:aKeys.has(k)?'cont':'new'});
  });
  aRows.forEach(r=>{
    const k=`${r['股票代號']}||${r['分點名稱']}`;
    if(seen.has(k))return;seen.add(k);
    compareResult.push({...r,_cmp:'exit'});
  });

  const cont=compareResult.filter(r=>r._cmp==='cont').length;
  const newIn=compareResult.filter(r=>r._cmp==='new').length;
  const exit=compareResult.filter(r=>r._cmp==='exit').length;

  const caption=`A:${aStart}～${endDate}　B:${bStart}～${endDate}　🟡持續${cont} 🟢新進${newIn} ⚪已退${exit}`;
  $('vip-caption').textContent=caption;
  if(window.innerWidth>768){const ov=$('vip-overlay');ov.classList.add('open');ov.style.display='flex';$('vip-overlay-caption').textContent=caption}

  renderVipCompareTable(compareResult);
}

  const addBtn=el('button',{class:'vip-add-btn',text:'🗂️ 加入工作組'});addBtn.style.cssText='flex:1;padding:5px 8px;font-size:.78rem';
  const selAllBtn=el('button',{class:'vip-add-btn',text:'☑ 全選'});selAllBtn.style.cssText='padding:5px 8px;font-size:.78rem;background:var(--bg3);border:1px solid var(--border);color:var(--text)';
  topBar.appendChild(addBtn);topBar.appendChild(selAllBtn);
  addBtn.onclick=async()=>{if(!vipSelected.size){alert('請先勾選');return}let added=0;vipSelected.forEach(k=>{const[s,b]=k.split('||');const dataRow=vipScanData.find(r=>String(r['股票代號']||'')==s&&String(r['分點名稱']||'')==b);const sname=dataRow?String(dataRow['股票名稱']||''):'';if(!workingGroup.find(w=>w['股票代號']===s&&w['追蹤分點']===b)){workingGroup.push({'股票代號':s,'股票名稱':sname,'追蹤分點':b});added++}});if(added){await saveWorkingGroup();renderWorkingGroup();vipSelected.clear();vipAllSelected=false;if(mode==='compare')mobileRunCompare();else mobileApplyVipFilter();alert(`✅ 已加入 ${added} 檔`)}else alert('全部已在工作組中')};
  selAllBtn.onclick=()=>{vipAllSelected=!vipAllSelected;selAllBtn.textContent=vipAllSelected?'☒ 取消全選':'☑ 全選';if(vipAllSelected)rows.forEach(r=>vipSelected.add(`${r['股票代號']}||${r['分點名稱']}`));else vipSelected.clear();_renderMobileVipTable(rows,mode)};
  const tbl=el('table',{class:'vip-table'}),thead=el('thead');
  const hdrs=mode==='compare'?[th('📊'),th('🗂️'),th('狀態'),th('代號'),th('名稱'),th('分點'),th('符合')]:[th('📊'),th('🗂️'),th('代號'),th('名稱'),th('分點'),th('符合')];
  thead.appendChild(tr(...hdrs));tbl.appendChild(thead);const tbody=el('tbody');
  rows.forEach(row=>{
    const sid=String(row['股票代號']||'').trim(),brr=String(row['分點名稱']||'').trim(),key=`${sid}||${brr}`;
    const loadCb=el('input',{type:'checkbox'});loadCb.onchange=()=>{if(loadCb.checked){switchToT4(sid,brr);loadCb.checked=false}};
    const selCb=el('input',{type:'checkbox'});if(vipSelected.has(key))selCb.checked=true;selCb.onchange=()=>{if(selCb.checked)vipSelected.add(key);else vipSelected.delete(key)};
    const cells=[td(loadCb),td(selCb)];
    if(mode==='compare'){let tagEl;if(row._cmp==='cont')tagEl=el('span',{class:'tag-cont',text:'🟡'});else if(row._cmp==='new')tagEl=el('span',{class:'tag-new',text:'🟢'});else tagEl=el('span',{class:'tag-exit',text:'⚪'});const t=el('td');t.appendChild(tagEl);cells.push(t)}
    cells.push(td({text:sid}),td({text:String(row['股票名稱']||'')}),td({text:brr}),td({text:row._match||''}));
    const r=tr(...cells);if(row._cmp==='exit')r.style.opacity='0.45';tbody.appendChild(r);
  });
  tbl.appendChild(tbody);
  const scrollWrap=document.createElement('div');scrollWrap.style.cssText='max-height:360px;overflow-y:auto;border:1px solid var(--border);border-radius:6px';scrollWrap.appendChild(tbl);
  wrap.innerHTML='';wrap.appendChild(topBar);wrap.appendChild(scrollWrap);$('m-vip-sel-wrap').innerHTML='';
}

(async()=>{if(token&&username){try{await initApp()}catch(e){doLogout()}}})();
</script>

  <div id="vip-overlay-inner">
    <div id="vip-overlay-header">
      <span id="vip-overlay-caption" style="font-size:.85rem;color:var(--text2)"></span>
      <button id="vip-overlay-close" style="background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);padding:4px 10px;cursor:pointer;font-size:.8rem">✕ 收起</button>
    </div>
    <div id="vip-table-wrap"></div><div id="vip-sel-wrap"></div>
  </div>
</div>
